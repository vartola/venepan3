<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recetas - VENEPAN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div class="container">

<aside class="sidebar"></aside>

  
    <main class="main-content">
    <header class="top-bar">
        <div class="page-info">
            <h2>Maestro de Recetas</h2>
            <span>Fórmulas estándar para cada tipo de pan</span>
        </div>
    </header>

    <!-- Tarjetas de estadísticas (rojas) -->
    <div class="stats-grid">
        <div class="stat-card red">
            <div class="stat-icon"><i class="fas fa-utensils"></i></div>
            <div class="stat-data">
                <h3 id="total-recetas">0</h3>
                <p>Recetas Activas</p>
            </div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon"><i class="fas fa-boxes"></i></div>
            <div class="stat-data">
                <h3 id="total-insumos-recetas">0</h3>
                <p>Total Insumos Registrados</p>
            </div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-data">
                <h3 id="promedio-insumos">0</h3>
                <p>Promedio Insumos x Receta</p>
            </div>
        </div>
    </div>

    <div class="card card-recetas">
        <div class="card-header">
            <h3><i class="fas fa-mitten"></i> Crear / Editar Fórmula</h3>
        </div>

        <div class="grid-form">
            <div class="input-group" style="grid-column: span 2;">
                <label>Producto</label>
                <select id="receta-producto">
                    <option value="">Seleccione un producto</option>
                </select>
            </div>
            <div class="input-group">
                <label>Harina (kg por medida)</label>
                <input type="number" id="ing-harina" step="0.01" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Levadura (kg por medida)</label>
                <input type="number" id="ing-levadura" step="0.01" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Soya líquida (kg)</label>
                <input type="number" id="ing-soya" step="0.01" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Cereales/Semillas (kg)</label>
                <input type="number" id="ing-cereales" step="0.01" placeholder="0.00">
            </div>
        </div>
        <input type="hidden" id="edit-id-receta" value="">
        <button id="btn-guardar-receta" class="btn-primary">GUARDAR FÓRMULA</button>
    </div>

    <div class="tables-container">
        <div class="card tabla-producto">
            <div class="card-header">
                <h3><i class="fas fa-book"></i> Recetario Registrado</h3>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>Producto</th><th>Insumos</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="lista-recetas"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</div>

<script src="menu.js"></script>
<script src="recetas.js"></script>
</body>
</html>
