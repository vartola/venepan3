<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal - VENEPAN</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
     <aside class="sidebar"></aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-info">
                    <h2>Gestión de Recursos Humanos</h2>
                    <span>Expediente digital y dotación de uniformes</span>
                </div>
                <div class="top-icons">
                    <i class="fas fa-users"></i>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card red">
                    <div class="stat-icon"><i class="fas fa-user-friends"></i></div>
                    <div class="stat-data">
                        <h3 id="total-empleados">0</h3>
                        <p>Total Personal</p>
                    </div>
                </div>
                <div class="stat-card red">
                    <div class="stat-icon"><i class="fas fa-user-graduate"></i></div>
                    <div class="stat-data">
                        <h3 id="cant-estudiantes">0</h3>
                        <p>Estudiantes</p>
                    </div>
                </div>
                <div class="stat-card red">
                    <div class="stat-icon"><i class="fas fa-notes-medical"></i></div>
                    <div class="stat-data">
                        <h3 id="cant-medico">0</h3>
                        <p>Alertas Médicas</p>
                    </div>
                </div>
            </div>

           <!-- Botón flotante para abrir el formulario -->
<button id="btn-abrir-form" class="btn-flotante" title="Agregar nuevo empleado">
    <i class="fas fa-plus"></i>
</button>

<!-- Overlay -->
<div id="form-overlay" class="form-overlay"></div>

<!-- Contenedor del formulario (modal) -->
<div id="form-contenedor" class="form-contenedor">
    <div class="form-header">
        <h2>
            <i class="fas fa-id-card"></i>
            Ficha Técnica del Trabajador
        </h2>
        <button id="btn-cerrar-form" class="btn-cerrar-form">
            <i class="fas fa-times"></i>
        </button>
    </div>
    
    <div class="form-body">
        <div class="grid-form">
            <div class="input-group">
                <label class="campo-obligatorio">Nombre</label>
                <input type="text" id="emp-nombre" placeholder="Ej: Juan">
            </div>

            <div class="input-group">
                <label class="campo-obligatorio">Apellido</label>
                <input type="text" id="emp-apellido" placeholder="Ej: Pérez">
            </div>
            
            <div class="input-group">
                <label class="campo-obligatorio">Cédula</label>
                <input type="text" id="emp-cedula" placeholder="V-00.000.000">
            </div>
              <div class="input-group">
                <label>Fecha Nacimiento</label>
                <input type="date" id="emp-nacimiento">
            </div>

            <div class="input-group">
                <label>Edad</label>
                <input type="number" id="emp-edad" placeholder="Años" readonly style="background-color: #f5f5f5; cursor: not-allowed;">
            </div>
            
            <div class="input-group">
                <label>Fecha Ingreso</label>
                <input type="date" id="emp-ingreso">
            </div>
            
          
            
            <div class="input-group">
                <label>Estado Civil</label>
                <select id="emp-estado-civil">
                    <option value="Soltero(a)">Soltero(a)</option>
                    <option value="Casado(a)">Casado(a)</option>
                    <option value="Divorciado(a)">Divorciado(a)</option>
                    <option value="Viudo(a)">Viudo(a)</option>
                    <option value="Concubinato">Concubinato</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Número de Hijos</label>
                <input type="number" id="emp-hijos" placeholder="0">
            </div>
            
            
            <div class="input-group">
                <label>Teléfono</label>
                <input type="text" id="emp-telefono" placeholder="04XX-0000000">
            </div>
            
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="emp-correo" placeholder="ejemplo@correo.com">
            </div>
            
            <div class="input-group" style="grid-column: span 2;">
                <label>Dirección de Habitación</label>
                <input type="text" id="emp-direccion" placeholder="Calle, sector y número de casa">
            </div>
            
            <div class="input-group">
                <label>Mano Dominante</label>
                <select id="emp-lateralidad">
                    <option value="Derecho">Derecho</option>
                    <option value="Zurdo">Zurdo</option>
                    <option value="Ambidiestro">Ambidiestro</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Nivel Educativo</label>
                <select id="emp-educacion">
                    <option value="Bachiller">Bachiller</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Universitario">Universitario</option>
                    <option value="Ingeniero">Ingeniero</option>
                    <option value="Licenciado">Licenciado</option>
                </select> 
            </div>
            
            <div class="input-group">
                <label>¿Estudia actualmente?</label>
                <select id="emp-estudiante">
                    <option value="No">No</option>
                    <option value="Si">Si</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Talla Camisa</label>
                <select id="emp-talla-camisa">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Talla Pantalón</label>
                <input type="number" id="emp-talla-pantalon" placeholder="Ej: 32">
            </div>
            
            <div class="input-group">
                <label>Talla Calzado</label>
                <input type="number" id="emp-talla-zapatos" placeholder="Ej: 41">
            </div>
            
            <div class="input-group">
                <label>Condición Médica</label>
                <input type="text" id="emp-enfermedad" placeholder="Ninguna">
            </div>
            
            <div class="input-group">
                <label>Alergias</label>
                <input type="text" id="emp-alergia" placeholder="Ninguna">
            </div>
            <div class="input-group">
                <label>Religión</label>
                <select id="emp-religion">
                 <option value="Adventista">Adventista</option>
                 <option value="Católica">Católica</option>
                 <option value="Evangélica">Evangélica</option>
                 <option value="Judía">Judía</option>
                 <option value="Islámica">Islámica</option>
                 <option value="Budista">Budista</option>
                 <option value="Hindú">Hindú</option>
                 <option value="Otra">Otra</option>
                 <option value="Ninguna">Ninguna</option>
             </select>
            </div>
                    
            <div class="input-group">
                <label>Cargo</label>
                <input type="text" id="emp-cargo" placeholder="Ej: Operador de producción">
            </div>
               <div class="input-group">
                <label>Salario</label>
                <input type="number" id="emp-salario" step="0.01" placeholder="0.00">
            </div>
        </div>
        
        
        <button id="btn-guardar-empleado" class="btn-primary">
            <i class="fas fa-save"></i> GUARDAR FICHA 
        </button>
    </div>
</div>

            <section class="card" style="border-top: 1px solid var(--border-color);">
                <div class="input-group">
                    <label><i class="fas fa-search"></i> BUSCAR EN NÓMINA</label>
                    <input type="text" id="buscador-empleado" placeholder="Escribe nombre o cédula..." onkeyup="filtrarEmpleados()">
                </div>
            </section>

            <div class="card tabla-producto">
                <div class="card-header">
                    <h3><i class="fas fa-list"></i> Personal Activo</h3>
                </div>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th>Trabajador / Cédula</th>
                                <th>Estado Civil</th>
                                <th style="text-align: right;">Gestión</th>
                            </tr>
                        </thead>
                        <tbody id="lista-empleados"></tbody>
                    </table>
                </div>
            </div>

           
        </main>
    </div>

        <script src="menu.js    "></script>
    <script src="empleados.js"></script>
</body>
</html>
